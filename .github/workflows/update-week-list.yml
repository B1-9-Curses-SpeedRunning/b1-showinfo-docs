name: Update Rematch Week List

on:
  workflow_dispatch:
  schedule:
    # 北京时间 周日 23:29（为了避免延迟，打一点提前量）。
    - cron: "29 15 * * 0"

jobs:
  build:
    name: Update Week List
    runs-on: windows-latest

    steps:
      # 检出 Git 仓库。
      - name: Check Out Git Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      # 安装 pnpm。
      - name: Setup Pnpm
        uses: pnpm/action-setup@v4

      # 安装 Node.js。
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 安装项目依赖。
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 更新 Week List 名单。
      - name: Generate Boss List
        run: pnpm run generate-week-boss-list

      # 提交更改。
      - name: Commit Changes
        uses: EndBug/add-and-commit@v9
        with:
          add: "data/"
          message: "Auto Update Rematch Week Boss List"
          default_author: github_actions
          pull: '--rebase --autostash ...'
