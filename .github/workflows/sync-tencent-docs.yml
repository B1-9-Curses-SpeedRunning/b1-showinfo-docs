name: Sync Tencent Docs

on:
  workflow_dispatch:
  # GitHub 的 CI 机器访问不到腾讯文档的链接，因此改用 self-hosted 自建机器。
  schedule:
    # 北京时间 每天 24:00（和 update-week-list.yml 时间错开）。
    - cron: "00 16 * * *"

jobs:
  sync:
    name: Sync Tencent Docs

    runs-on: [self-hosted]

    container:
      image: crpi-96fmgk5153fcd5gd.cn-chengdu.personal.cr.aliyuncs.com/images-davidingplus/b1-showinfo-docs-docker-runtime:latest

    env:
      TENCENT_ACCESS_TOKEN: ${{ secrets.TENCENT_ACCESS_TOKEN }}
      TENCENT_CLIENT_ID: ${{ secrets.TENCENT_CLIENT_ID }}
      TENCENT_OPEN_ID: ${{ secrets.TENCENT_OPEN_ID }}

    steps:
      # 拉取仓库代码。
      - name: Check Out Git Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      # 测试工具链。
      - name: Test Tool Chains
        run: |
          python -V
          node -v
          npm -v
          pnpm -v
          git --version

          python -c "print('hello python')"
          node -e "console.log('hello node')"

      # 安装项目依赖。
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 执行同步脚本。
      - name: Run Sync Script
        run: pnpm run sync-tencent-docs

      # 生成最新数据文件。
      - name: Generate Newest Data
        run: pnpm run generate-data

      # 生成提交日期（北京时间）。
      - name: Generate Commit Time
        run: |
          export TZ='Asia/Shanghai'
          echo "COMMIT_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      # 提交更改。
      - name: Commit Changes Without Push
        id: commit-changes-without-push
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # 配置 Http 使得连接尽量稳定。
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          # 没有变更就直接结束，避免 git commit 失败。
          if git diff --cached --quiet; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

          git commit -m "Auto Sync Tencent Docs (${{ env.COMMIT_TIME }})"

      # 推送到远端仓库。因为这个 CI 是跑在自己服务器上的，连接 GitHub 不稳定，push 可能会失败，所以在这里添加重试机制。
      - name: Push To Remote Git Repository
        if: steps.commit-changes-without-push.outputs.has-changes == 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: |
            git pull --rebase --autostash
            git push origin HEAD:${{ github.ref_name }}
